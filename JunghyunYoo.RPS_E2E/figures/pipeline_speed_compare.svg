<style>.bg{fill:#f7f8fb}.card{fill:white;stroke:#d8dde8;stroke-width:1}.title{font:700 24px Arial,sans-serif;fill:#172033}.sub{font:400 14px Arial,sans-serif;fill:#526071}.label{font:700 15px Arial,sans-serif;fill:#253044}.small{font:400 14px Arial,sans-serif;fill:#526071}</style>
